<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="一个本地运行的网易云音乐歌单筛选器，用于屏蔽指定歌手、挑选歌曲并生成新歌单。"
    />
    <title>网易云歌单筛选器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <section class="brand-block" aria-labelledby="app-title">
          <p class="eyebrow">网易云歌单整理</p>
          <h1 id="app-title">把喜欢的歌挑进新歌单</h1>
          <p class="subtitle">读取已有歌单，屏蔽不想听的歌手，再按卡片选择要加入新歌单的歌曲。</p>
        </section>

        <section class="bridge-panel" aria-label="本地桥接服务">
          <div>
            <span class="status-dot" id="bridgeDot"></span>
            <span id="bridgeStatus">未连接本地桥接</span>
          </div>
          <label class="bridge-input">
            <span>桥接地址</span>
            <input id="bridgeUrl" value="http://localhost:3017" spellcheck="false" />
          </label>
          <button class="icon-button" id="testBridge" title="测试连接" aria-label="测试连接">
            <span aria-hidden="true">↗</span>
          </button>
        </section>
      </header>

      <section class="workspace">
        <aside class="control-panel" aria-label="筛选控制">
          <div class="panel-section">
            <h2>歌单来源</h2>
            <label class="field">
              <span>源歌单 ID</span>
              <input id="sourcePlaylistId" placeholder="例如 123456789" inputmode="numeric" />
            </label>
            <div class="button-row">
              <button id="loadFromBridge">从桥接读取</button>
              <label class="file-button">
                导入 JSON
                <input id="jsonFile" type="file" accept="application/json,.json" />
              </label>
            </div>
          </div>

          <div class="panel-section">
            <h2>新歌单</h2>
            <label class="field">
              <span>歌单名</span>
              <input id="targetPlaylistName" value="筛选后的新歌单" />
            </label>
            <label class="field">
              <span>搜索歌曲 / 专辑 / 歌手</span>
              <input id="searchInput" placeholder="输入关键词" />
            </label>
          </div>

          <div class="panel-section">
            <h2>屏蔽歌手</h2>
            <form class="artist-form" id="artistForm">
              <input id="artistInput" placeholder="输入歌手名" />
              <button type="submit" class="icon-button" title="添加歌手" aria-label="添加歌手">+</button>
            </form>
            <div class="chip-list" id="blockedArtists" aria-live="polite"></div>
          </div>

          <div class="panel-section compact">
            <h2>批量操作</h2>
            <div class="button-row wrap">
              <button id="selectVisible">全选可见</button>
              <button id="invertVisible">反选可见</button>
              <button id="clearSelected">清空</button>
            </div>
          </div>
        </aside>

        <section class="main-panel" aria-label="歌曲列表">
          <div class="summary-strip">
            <div>
              <strong id="totalCount">0</strong>
              <span>首歌曲</span>
            </div>
            <div>
              <strong id="visibleCount">0</strong>
              <span>当前可见</span>
            </div>
            <div>
              <strong id="selectedCount">0</strong>
              <span>已选择</span>
            </div>
            <div>
              <strong id="blockedCount">0</strong>
              <span>已屏蔽</span>
            </div>
          </div>

          <div class="toolbar">
            <div class="segmented" role="group" aria-label="显示模式">
              <button class="active" data-mode="available">可选择</button>
              <button data-mode="selected">已选择</button>
              <button data-mode="blocked">被屏蔽</button>
              <button data-mode="all">全部</button>
            </div>
            <button class="primary" id="createPlaylist">生成新歌单</button>
          </div>

          <div class="song-grid" id="songGrid"></div>
          <p class="empty-state hidden" id="emptyState">没有匹配的歌曲。</p>
        </section>
      </section>
    </main>

    <dialog id="resultDialog">
      <form method="dialog" class="dialog-body">
        <div class="dialog-title">
          <h2>新歌单草稿</h2>
          <button class="icon-button" value="close" title="关闭" aria-label="关闭">×</button>
        </div>
        <p id="resultSummary"></p>
        <pre id="resultPayload"></pre>
        <div class="button-row end">
          <button type="button" id="downloadJson">下载 JSON</button>
          <button type="button" id="submitBridge" class="primary">提交到桥接服务</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
